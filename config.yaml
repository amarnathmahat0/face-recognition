camera:
  index: 0
  width: 640
  height: 480
  ring_buffer_size: 5
  reconnect_attempts: 3
  reconnect_backoff_seconds: 2.0

recognition:
  similarity_threshold: 0.60
  min_face_size: 80
  blur_threshold: 100.0
  samples_per_identity: 15
  sample_frame_gap: 5
  max_samples_per_identity: 20
  confidence_high: 0.80
  confidence_medium: 0.65
  verify_frame_gap: 2
  liveness_threshold: 0.30
  liveness_window: 5
  detector_use_profile: true
  registration_multi_angle: true

storage:
  data_dir: ./data/faces
  embeddings_ext: .npy
  metadata_ext: .json

logging:
  level: INFO
  file: ./logs/app.log
  max_bytes: 5242880  # 5MB
  backup_count: 3

ui:
  window_title: "FaceID — Production Face Recognition"
  min_width: 1024
  min_height: 640
  fps_rolling_window: 30
  debug_mode: false
